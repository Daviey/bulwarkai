name: Configure DNS

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_ZONE: ${{ vars.CLOUDFLARE_ZONE_ID }}

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Set GitHub Pages DNS records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          BASE="https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/dns_records"

          fetch_records() {
            curl -s "$BASE" -H "Authorization: Bearer $CF_TOKEN"
          }

          delete_record() {
            curl -s -X DELETE "$BASE/$1" -H "Authorization: Bearer $CF_TOKEN" | grep -q '"success":true'
          }

          create_record() {
            curl -s -X POST "$BASE" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$1" | grep -q '"success":true'
          }

          EXISTING=$(fetch_records)
          echo "Existing records:"
          echo "$EXISTING" | grep -oP '"name":"[^"]+","content":"[^"]+"' || true

          GITHUB_IPS="185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153"
          DESIRED_A=$(echo "$GITHUB_IPS" | tr ' ' '\n' | sort)

          # Get current A records for apex
          CURRENT_A=$(echo "$EXISTING" | grep -oP '"id":"[^"]+","type":"A","name":"bulwarkai\.cloud","content":"[^"]+"' || true)
          CURRENT_A_IPS=$(echo "$CURRENT_A" | grep -oP '"content":"\K[^"]+' | sort || true)
          CURRENT_A_IDS=$(echo "$CURRENT_A" | grep -oP '"id":"\K[^"]+' || true)

          if [ "$CURRENT_A_IPS" = "$DESIRED_A" ]; then
            echo "A records already correct"
          else
            echo "Recreating A records..."
            for id in $CURRENT_A_IDS; do
              delete_record "$id" && echo "  Deleted $id"
            done
            for IP in $GITHUB_IPS; do
              create_record "{\"type\":\"A\",\"name\":\"bulwarkai.cloud\",\"content\":\"$IP\",\"proxied\":true,\"ttl\":1}" && echo "  Created A $IP"
            done
          fi

          # CNAME for www
          WWW_RECORD=$(echo "$EXISTING" | grep -oP '"id":"[^"]+","type":"CNAME","name":"www\.bulwarkai\.cloud","content":"[^"]+"' || true)
          WWW_ID=$(echo "$WWW_RECORD" | grep -oP '"id":"\K[^"]+' || true)
          WWW_TARGET=$(echo "$WWW_RECORD" | grep -oP '"content":"\K[^"]+' || true)

          if [ "$WWW_TARGET" = "daviey.github.io" ]; then
            echo "www CNAME already correct"
          else
            echo "Recreating www CNAME..."
            for id in $WWW_ID; do
              delete_record "$id" && echo "  Deleted $id"
            done
            create_record '{"type":"CNAME","name":"www.bulwarkai.cloud","content":"daviey.github.io","proxied":true,"ttl":1}' && echo "  Created CNAME www -> daviey.github.io"
          fi

          echo "DNS configuration complete"
