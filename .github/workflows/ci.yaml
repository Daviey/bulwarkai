name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go test -count=1 -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - run: go tool cover -func=coverage.out

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go vet ./...

  gosec:
    name: SAST (gosec)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: gosec -fmt sarif -out gosec.sarif -exclude G101,G304,G704,G705 ./...
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: gosec.sarif
          category: gosec

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  trivy:
    name: Container Scan (trivy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    name: Terraform Validate & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"
      - run: tofu -chdir=terraform init -backend=false
      - run: tofu -chdir=terraform validate
      - run: tofu -chdir=terraform test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: CGO_ENABLED=0 go build -ldflags "-X main.version=$(git describe --tags --always)" -o bulwarkai .
      - run: file bulwarkai | grep -q "statically linked"

  docs:
    name: Docs Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: Regenerate and diff
        run: |
          swag init -g main.go -d .,./internal/handler --parseInternal --output ./docs --outputTypes yaml
          git diff --exit-code docs/swagger.yaml
